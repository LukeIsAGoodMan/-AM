issuerSlug: hang-seng

card:
  slug: hang-seng-enjoy-card
  cardNameEn: Hang Seng enJoy Card
  cardNameZh: 恒生 enJoy 卡
  network: Mastercard
  cardLevel: platinum
  annualFeeHkd: 0
  status: active
  officialUrl: https://www.hangseng.com
  notes: |
    Pre-M14 modeling — selected-category demo. Card lets user pick
    N categories at signup; only those rules earn the 4% bonus.

    Modeled as one rule per common pickable category, each with
    requiresSelectedCategory=true. Real card uses yuu points; we
    convert to hkd_cashback at ~1% effective for simplicity.
    Phase 2 reviewer will switch to a proper yuu_points currency.
  qualitativeFeatures:
    xlsxCategory: Rewards
    xlsxSpecialty: Retail ecosystem
    xlsxBaseRewardText: yuu points (modeled as cashback)
    summaryZh: |
      enJoy 卡讓用戶自選幾個獎賞類別，所選類別有 4% 額外回贈。日常無條件 0.4%。
    bestUseCaseZh: 預先挑好常用類別後當主卡 — 餐飲 / 超市 / 線上等
    welcomeOfferDraft:
      spendRequirementText: HK$6,000
      bonusType: Points
      bonusValueText: 120k yuu points
      periodDays: 90

sources:
  - slug: hang-seng-enjoy-official-page
    sourceType: official_page
    sourcePriority: 2
    title: Hang Seng enJoy Card — official page
    url: https://www.hangseng.com
    language: mixed
    status: active
    notes: Placeholder URL. Replace with deep link / T&C PDF in Phase 2.

