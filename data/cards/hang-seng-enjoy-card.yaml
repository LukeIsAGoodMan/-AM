      rate: 0.004
    rewardCurrencySlug: hkd_cashback
    sourceSlug: hang-seng-enjoy-official-page
    confidenceScore: 0.7
    priority: 100

  # The 4% bonus is split into one rule per common pickable category so the
  # calculator's selected-category gate (requiresSelectedCategory) filters
  # per-category cleanly.
